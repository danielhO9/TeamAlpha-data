name: Deploy data pipeline

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "deploy/**"
      - "pipeline/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-data-pipeline
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
  SCHEDULE_NAME: ${{ vars.SCHEDULE_NAME }}
  SCHEDULE_EXPRESSION: "cron(30 8 ? * TUE-SAT *)"
  SCHEDULE_TIMEZONE: Asia/Seoul

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure deployment environment
        run: |
          set -euo pipefail

          DEFAULT_REPOSITORY="$(
            basename "${GITHUB_REPOSITORY}" \
              | tr '[:upper:]' '[:lower:]'
          )"
          AWS_ACCOUNT_ID="$(
            aws sts get-caller-identity \
              --query Account \
              --output text
          )"

          ECR_REPOSITORY="${ECR_REPOSITORY:-${DEFAULT_REPOSITORY}}"
          ECS_TASK_FAMILY="${ECS_TASK_FAMILY:-${DEFAULT_REPOSITORY}-daily-full}"
          CONTAINER_NAME="${CONTAINER_NAME:-${ECS_TASK_FAMILY}}"
          SCHEDULE_NAME="${SCHEDULE_NAME:-${ECS_TASK_FAMILY}-tue-sat-0830-kst}"

          {
            echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}"
            echo "ECR_REPOSITORY=${ECR_REPOSITORY}"
            echo "ECS_TASK_FAMILY=${ECS_TASK_FAMILY}"
            echo "CONTAINER_NAME=${CONTAINER_NAME}"
            echo "SCHEDULE_NAME=${SCHEDULE_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: image
        run: |
          set -euo pipefail

          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_SHA="${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          docker buildx build \
            --platform linux/amd64 \
            -f deploy/Dockerfile \
            -t "${IMAGE_SHA}" \
            -t "${IMAGE_LATEST}" \
            --push \
            .

          echo "image_uri=${IMAGE_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Register ECS task definition
        id: task
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          set -euo pipefail

          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_FAMILY}" \
            --query taskDefinition \
            --output json > current-task-definition.json

          jq \
            --arg image "${IMAGE_URI}" \
            --arg container "${CONTAINER_NAME}" \
            '
            {
              family,
              taskRoleArn,
              executionRoleArn,
              networkMode,
              containerDefinitions,
              volumes,
              placementConstraints,
              requiresCompatibilities,
              cpu,
              memory,
              runtimePlatform,
              ephemeralStorage,
              ipcMode,
              pidMode,
              proxyConfiguration,
              inferenceAccelerators
            }
            | with_entries(select(.value != null and .value != [] and .value != {}))
            | .containerDefinitions |= map(
                if .name == $container then
                  .image = $image
                  | .entryPoint = ["uv", "run", "python", "-m", "pipeline.daily_full"]
                  | del(.command)
                else
                  .
                end
              )
            ' current-task-definition.json > new-task-definition.json

          TASK_DEFINITION_ARN="$(
            aws ecs register-task-definition \
              --cli-input-json file://new-task-definition.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"

          echo "task_definition_arn=${TASK_DEFINITION_ARN}" >> "${GITHUB_OUTPUT}"

      - name: Update EventBridge Scheduler target
        env:
          TASK_DEFINITION_ARN: ${{ steps.task.outputs.task_definition_arn }}
        run: |
          set -euo pipefail

          aws scheduler get-schedule \
            --name "${SCHEDULE_NAME}" \
            --query Target \
            --output json > current-schedule-target.json

          jq \
            --arg task_definition_arn "${TASK_DEFINITION_ARN}" \
            '.EcsParameters.TaskDefinitionArn = $task_definition_arn' \
            current-schedule-target.json > new-schedule-target.json

          aws scheduler update-schedule \
            --name "${SCHEDULE_NAME}" \
            --schedule-expression "${SCHEDULE_EXPRESSION}" \
            --schedule-expression-timezone "${SCHEDULE_TIMEZONE}" \
            --flexible-time-window '{"Mode":"OFF"}' \
            --target file://new-schedule-target.json \
            --state ENABLED

      - name: Show deployed version
        run: |
          aws scheduler get-schedule \
            --name "${SCHEDULE_NAME}" \
            --query '{name:Name,state:State,expression:ScheduleExpression,timezone:ScheduleExpressionTimezone,taskDefinition:Target.EcsParameters.TaskDefinitionArn}' \
            --output table
